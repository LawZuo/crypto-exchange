spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    dynamic:
      primary: account
      datasource:
        account:
          url: jdbc:mysql://106.12.183.54:3306/exchange?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
          username: ${DB_USER:lawzhuo}
          password: ${DB_PASSWORD:LawZhuo1002.}

    # Druid 专属配置
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

      # 监控（生产暴露内部端口）
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: ${DRUID_PASSWORD:123456}

      # 慢 SQL 监控
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000

      # 防 SQL 注入
      wall:
        enabled: true
        config:
          multi-statement-allow: false

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.exchange.order.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID         # 雪花算法生成 ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0